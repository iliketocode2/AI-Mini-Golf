<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mini Golf</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Force some inline contrast issues for the scanner */
        .value { color: #eee; background-color: #fff; } 
        .close { cursor: pointer; }
    </style>
</head>
<body>
  <header>
    <h1>A11y Check2</h1>
  </header>
  
  <main>
    <h1>A11y Check</h1>
    
    <div id="instructionPopup" class="popup" role="none">
      <div class="popup-content">
        <span class="close">&times;</span>
        
        <h2>Instructions</h2>
        <p>Welcome to the AI Mini Golf Simulation!</p>
        <ol>
          <li>Use the dropdown menu to select between walls and sand traps.</li>
        </ol>
      </div>
    </div>

    <button aria-label="Action"></button>

    <h1>h</h1>

    <div class="header">
      <h2>AI Mini Golf</h2>
    </div>

    <div class="twoCol">
      <div class="column">
        
        <canvas id="mainCanvas" width="400" height="400"></canvas>

        <div>
            <button id="startSimulation">Start Simulation</button>
            <button id="resetGrid">Reset Grid</button>
        </div>

        <div>
            <span>Mode: </span>
            <select id="drawMode">
                <option value="wall">Place Wall</option>
                <option value="sand">Place Sand</option>
                <option value="hole">Place Hole</option>
            </select>
        </div>
      </div>
      
      <div class="column">
        <h3>Number of Steps Vs. Number of Attempts</h3>
        <canvas id="graphCanvas" width="400" height="200"></canvas>
        
        <div class="container">
          <div class="circle">
            <span class="label">State:</span>
            <span id="state" class="value">0</span>
          </div>
        </div>

        <div class="slidecontainer">
          <span style="margin-right: 10px;">Step speed (ms):</span>
          <input type="range" min="0" max="1000" value="500" class="slider" id="speed">
          <span id="speedValue">500</span>
        </div>

        <div class="slidecontainer">
          <span style="margin-right: 10px;">Max attempts:</span>
          <input type="range" min="10" max="1000" value="500" class="slider" id="attempts">
          <span id="attemptsValue">500</span>
        </div>

      </div>
    </div>
  </main>
    <script src="script.js"></script>
</body>
</html>
