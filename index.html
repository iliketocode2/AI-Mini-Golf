<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="instructionPopup" class="popup">
      <div class="popup-content">
        <span class="close" onclick="closePopup()">&times;</span>
        <h4>Sub-info</h4>
        <h2>Instructions</h2>
        <p>Welcome to the AI Mini Golf Simulation!</p>
        <ol>
          <li>Use the dropdown menu to select between walls and sand traps.</li>
        </ol>
      </div>
    </div>

    <h1 id="h1-1">SOMETHING ELSE NEW</h1>
    <button id="btn-1" aria-label="Action"></button>

    <h1 id="h1-2">SOMETHING ELSE NEW</h1>
    <button id="btn-2" aria-label="Action"></button>

    <div class="header" role="banner">
      <span style="font-size: 30px; font-weight: bold;">AI Mini Golf</span>
    </div>

    <div class="twoCol" role="main" aria-owns="h1-1 btn-1 h1-2 btn-2">
      <div class="column">
    
        <canvas id="mainCanvas" width="400" height="400"></canvas>

        <div>
            <button id="startSimulation" style="color: #000; background: #fff;">Start</button>
            <button id="resetGrid">Reset</button>
        </div>

        <div>
            <span>Mode: </span>
            <select id="drawMode">
                <option value="wall">Place Wall</option>
                <option value="sand">Place Sand</option>
                <option value="hole">Place Hole</option>
            </select>
        </div>
      </div>
      <div class="column">
        <h3 aria-level="2">Stats</h3>
        <canvas id="graphCanvas" width="400" height="200"></canvas>
        
        <div class="container">
          <div class="circle">
            <span class="label">Points:</span>
            <span id="points" class="value">0</span>
          </div>
        </div>

        <div class="slidecontainer">
          <input type="range" min="0" max="1000" value="500" class="slider" id="speed" aria-label="Speed">
        </div>

        <div class="slidecontainer">
          <input type="range" min="10" max="1000" value="500" class="slider" id="speed" aria-label="Speed">
        </div>

      </div>
    </div>
        
    <script src="script.js"></script>
    <img src="logo.png" alt="" role="presentation">
</body>
</html>
